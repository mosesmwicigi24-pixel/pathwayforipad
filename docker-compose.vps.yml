# VPS-specific overrides for the shared Hostinger box, layered on
# docker-compose.prod.yml:
#   docker compose -f docker-compose.prod.yml -f docker-compose.vps.yml up -d
#
# A host-level nginx (not the prod Caddy service) owns 80/443 and terminates TLS,
# so we publish the API on 127.0.0.1:8090 for nginx to proxy, and DON'T start
# Caddy. The extra environment passthrough wires Brevo SMTP (password reset),
# Nuru AI (Groq/Gemini), Cloudinary uploads, and the public app URL — all read
# from the VPS-only .env (§5.10), never committed.
services:
  api:
    ports:
      - "127.0.0.1:8090:8080"
    # Self-hosted video storage: uploaded bytes land on the host disk (served by
    # nginx at https://pathway.nuruplace.org/media/...), NOT Cloudinary.
    volumes:
      - /var/www/pathway-media:/data/media
    environment:
      MEDIA_STORAGE_DIR: ${MEDIA_STORAGE_DIR:-/data/media}
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-https://pathway.nuruplace.org/media}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_TLS_SERVERNAME: ${SMTP_TLS_SERVERNAME}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      EMAIL_FROM: ${EMAIL_FROM}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      # M-Pesa (Daraja) STK push — read from the VPS-only .env (§5.10). The provider
      # is "ready" only when key+secret+passkey+shortcode+callback URL are all set.
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-}
      MPESA_ENV: ${MPESA_ENV:-sandbox}
      MPESA_TX_TYPE: ${MPESA_TX_TYPE:-CustomerPayBillOnline}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-https://pathway.nuruplace.org/v1/webhooks/mobilemoney/mpesa}
