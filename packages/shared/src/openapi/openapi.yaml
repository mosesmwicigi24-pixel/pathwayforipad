        "200": { description: Hidden }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Chat: DMs, cell groups, public spaces (mobile Chat make) ---
  /chat/conversations:
    get:
      tags: [progress]
      summary: My chat inbox — DMs, cell groups, joined spaces (with unread + preview) plus discoverable spaces.
      responses:
        "200": { description: Conversations }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /chat/conversations/{id}:
    get:
      tags: [progress]
      summary: A conversation's messages (reactions, reply previews); 404 outside my membership/scope (no existence leak).
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Conversation }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/conversations/{id}/messages:
    post:
      tags: [progress]
      summary: Send a message (client-generated id; offline-queueable; idempotent on client_mutation_id).
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "201": { description: Created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/conversations/{id}/read:
    post:
      tags: [progress]
      summary: Mark a conversation read (clears unread); offline-queueable.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Read }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/messages/{id}/reactions:
    post:
      tags: [progress]
      summary: Toggle a reaction emoji on a message; offline-queueable.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Toggled }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/messages/{id}:
    patch:
      tags: [progress]
      summary: Edit my own message body (author-only); sets the edited flag.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Edited }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [progress]
      summary: Soft-delete my own message (author-only); removed from all reads.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/people:
    get:
      tags: [progress]
      summary: DM directory — members I may message (same congregation, minor-safe; excludes self). Optional ?q name search.
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string, maxLength: 120 }
      responses:
        "200": { description: People }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /chat/dms:
    post:
      tags: [progress]
      summary: Open (or fetch) a 1:1 DM with another member; minor-safe (D-M6); same congregation.
      responses:
        "201": { description: Conversation }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/cells/{id}/conversation:
    post:
      tags: [progress]
      summary: Open (provisioning on first use) a cell's group room (Instructor+; scoped to leader_assignments — Admin passes). Backs the portal "Message cell" action.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "201": { description: Conversation }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/spaces:
    post:
      tags: [progress]
      summary: Leader curates a public space for the congregation (Instructor+); optional category tag (e.g. youth, marketplace).
      responses:
        "201": { description: Created }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
  /chat/attachments/sign:
    post:
      tags: [progress]
      summary: Broker a signed direct-upload URL for a chat attachment (bytes go to Cloudinary, never our server). Returns object_key to reference in a message.
      responses:
        "201": { description: Signed upload }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /chat/spaces/{id}/join:
    post:
      tags: [progress]
      summary: Join a public space in my congregation.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Joined }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/messages/{id}/flag:
    post:
      tags: [progress]
      summary: Flag a message for review (Admin/SuperAdmin); soft — still visible to members.
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: { reason: { type: string } }
      responses:
        "200": { description: Moderation state }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/messages/{id}/unflag:
    post:
      tags: [progress]
      summary: Clear a message's flag (Admin/SuperAdmin).
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Moderation state }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/messages/{id}/remove:
    post:
      tags: [progress]
      summary: Remove a message — hide it from members (Admin/SuperAdmin).
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Moderation state }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
        "404": { $ref: "#/components/responses/NotFound" }
  /chat/messages/{id}/restore:
    post:
      tags: [progress]
      summary: Restore a removed message — make it visible to members again (Admin/SuperAdmin).
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200": { description: Moderation state }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/ForbiddenScope" }
        "404": { $ref: "#/components/responses/NotFound" }

  /giving/paypal/capture:
    post:
      tags: [progress]
      summary: Capture a PayPal order the member approved (USD); settles the ledger on COMPLETED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id]
              properties: { order_id: { type: string } }
      responses:
        "200": { description: Capture status }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Nuru AI assistant (mobile make) ---
  /assistant/chat:
    post:
      tags: [progress]
      summary: Ask Nuru — AI companion (summarize a chat, draft an encouragement, find prayer, plan quiet time). Grounds only on conversations the member can access.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    required: [role, text]
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      text: { type: string }
                conversation_id: { type: string, format: uuid }
      responses:
        "200": { description: Reply }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # --- Webhooks & sync (system) (§3.3) ---
  /webhooks/stripe:
    post:
      tags: [system]
      summary: Stripe event receiver; HMAC-verified + idempotent.
      security: []
      responses:
        "200": { description: Acknowledged }
  /webhooks/mobilemoney/{provider}:
    post:
      tags: [system]
      summary: M-Pesa/Airtel callback receiver; HMAC-verified + idempotent — settlement happens only here.
      security: []
      parameters:
        - { name: provider, in: path, required: true, schema: { type: string, enum: [mpesa, airtel] } }
      responses:
        "200": { description: Acknowledged }
  /sync/pull:
    post:
      tags: [system]
      summary: Delta pull — cursors in, changed rows + tombstones + new cursors out.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SyncPullRequest" }
      responses:
        "200":
          description: Delta
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncPullResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /sync/push:
    post:
      tags: [system]
      summary: Replay the offline mutation queue; per-mutation results.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SyncPushRequest" }
      responses:
        "200":
          description: Per-mutation results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncPushResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 50, maximum: 200 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }

  responses:
    Conflict:
      description: Optimistic-concurrency clash; current value returned.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    GateLocked:
      description: Content or action blocked by the gating engine.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ForbiddenScope:
      description: Authenticated but not authorised for this resource.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing, invalid, or expired credentials.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unprocessable:
      description: Well-formed but semantically invalid (e.g. unknown cell group).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    UpstreamUnavailable:
      description: A required dependency (e.g. the IdP) is unreachable or not configured.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            details: { type: object, additionalProperties: true }

    # --- Auth & identity (§3.3, §5.3) ---
    OAuthExchange:
      type: object
      required: [code]
      description: Server-side authorization-code exchange inputs (§5.3).
      properties:
        code: { type: string, minLength: 1 }
        redirect_uri: { type: string, format: uri }
        code_verifier: { type: string, minLength: 1, description: PKCE verifier }
    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string, description: Short-lived (15-min) access JWT }
        refresh_token: { type: string, description: Rotating refresh token (returned once) }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: Access-token lifetime in seconds }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, minLength: 1 }
    MeProfile:
      type: object
      required: [profile]
      properties:
        profile:
          type: object
          required: [user_id, full_name, role, congregation_id, row_version]
          properties:
            user_id: { type: string, format: uuid }
            email: { type: [string, "null"] }
            full_name: { type: string }
            phone_number: { type: [string, "null"] }
            date_of_birth: { type: [string, "null"], format: date }
            year_of_salvation: { type: [integer, "null"] }
            is_baptized: { type: boolean }
            cell_group_id: { type: [string, "null"], format: uuid }
            congregation_id: { type: [string, "null"], format: uuid }
            role: { type: string, enum: [Student, Instructor, Admin, SuperAdmin] }
            timezone: { type: string }
            locale: { type: string }
            is_minor: { type: boolean }
            row_version: { type: integer }
        enrollment:
          type: [object, "null"]
          properties:
            enrollment_id: { type: string, format: uuid }
            current_level: { type: integer }
            state: { type: string, enum: [active, paused, completed, withdrawn] }
            started_at: { type: string, format: date-time }
    ProfileUpdate:
      type: object
      required: [row_version]
      description: Mutable fields only; role/congregation/email are not self-writable (§5.4, §5.8).
      properties:
        full_name: { type: string, minLength: 1, maxLength: 255 }
        phone_number: { type: string, minLength: 3, maxLength: 32 }
        cell_group_id: { type: [string, "null"], format: uuid }
        timezone: { type: string, maxLength: 64 }
        locale: { type: string, maxLength: 12 }
        gender: { type: [string, "null"], enum: [male, female, prefer_not_to_say, null] }
        city: { type: [string, "null"], maxLength: 120 }
        country_code: { type: [string, "null"], minLength: 2, maxLength: 2 }
        date_of_birth: { type: [string, "null"], format: date }
        socials: { type: object, additionalProperties: { type: string } }
        row_version: { type: integer, description: Expected version for optimistic concurrency }
    OnboardingIntake:
      type: object
      required: [date_of_birth, phone_number, cell_group_id]
      properties:
        date_of_birth: { type: string, format: date }
        phone_number: { type: string, minLength: 3, maxLength: 32 }
        cell_group_id: { type: string, format: uuid }
        year_of_salvation: { type: integer, minimum: 1900, maximum: 2100 }
        is_baptized: { type: boolean, default: false }
        timezone: { type: string, maxLength: 64 }
    DeviceRegister:
      type: object
      required: [platform]
      properties:
        platform: { type: string, enum: [ios, android] }
        app_version: { type: string, maxLength: 20 }
        push_token: { type: string, maxLength: 512 }
    MfaEnroll:
      type: object
      required: [otpauth_uri, secret]
      properties:
        otpauth_uri: { type: string, description: otpauth:// URI for QR provisioning }
        secret: { type: string, description: base32 TOTP secret (shown once for manual entry) }
    MfaVerify:
      type: object
      required: [code]
      properties:
        code: { type: string, pattern: "^[0-9]{6,10}$" }
    MfaElevation:
      type: object
      required: [access_token, token_type, expires_in, mfa_enabled]
      properties:
        access_token: { type: string, description: Access token carrying the verified mfa claim }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }
        mfa_enabled: { type: boolean }

    GivingIntentRequest:
      type: object
      required: [fund, amount_minor, currency]
      properties:
        fund: { type: string, description: "Fund code from the funds table (tithe, offering, general, media, mission, gift, …)" }
        amount_minor: { type: integer, format: int64, description: "Minor units, never floats" }
        currency: { type: string, minLength: 3, maxLength: 3 }
        method: { type: string, enum: [card, mpesa, airtel], default: card }
        phone_number: { type: string, description: "Mobile money only — where the STK push lands; defaults to the profile phone" }
        idempotency_key: { type: string, minLength: 8, maxLength: 255, description: Client-supplied; replays return the same transaction }
    GivingIntentResult:
      type: object
      required: [transaction_id, status, idempotency_key, reused]
      properties:
        transaction_id: { type: string, format: uuid }
        client_secret: { type: string, description: Stripe PaymentIntent client secret (card method only; absent on a reused intent) }
        provider: { type: string, enum: [stripe, mpesa, airtel] }
        provider_ref: { type: string, description: Mobile-money checkout reference (STK push sent) }
        status: { type: string, enum: [processing, succeeded, failed, requires_action, refunded] }
        idempotency_key: { type: string }
        reused: { type: boolean }
    GivingScheduleCreate:
      type: object
      required: [fund, amount_minor, currency, frequency]
      properties:
        fund: { type: string }
        amount_minor: { type: integer, format: int64 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        frequency: { type: string, enum: [weekly, monthly] }
        method: { type: string, enum: [card, mpesa, airtel], default: card }
        idempotency_key: { type: string, minLength: 8, maxLength: 255 }
    GivingRecord:
      type: object
      required: [transaction_id, amount_minor, currency, status]
      properties:
        transaction_id: { type: string, format: uuid }
        amount_minor: { type: integer, format: int64 }
        currency: { type: string }
        status: { type: string }
        fund: { type: [string, "null"] }
        created_at: { type: string, format: date-time }
        settled_at: { type: [string, "null"], format: date-time }

    GivingDetail:
      type: object
      required: [transaction_id, amount_minor, currency, status, ledger]
      properties:
        transaction_id: { type: string, format: uuid }
        amount_minor: { type: integer, format: int64 }
        currency: { type: string }
        status: { type: string }
        fund: { type: [string, "null"] }
        method: { type: string }
        provider_ref: { type: [string, "null"] }
        schedule_id: { type: [string, "null"], format: uuid }
        created_at: { type: string, format: date-time }
        settled_at: { type: [string, "null"], format: date-time }
        ledger:
          type: array
          items:
            type: object
            required: [side, account, amount_minor, currency]
            properties:
              side: { type: string }
              account: { type: string }
              amount_minor: { type: integer, format: int64 }
              currency: { type: string }

    QuizSubmission:
      type: object
      required: [client_mutation_id, answers]
      properties:
        client_mutation_id: { type: string, format: uuid }
        answers:
          type: array
          items:
            type: object
            required: [question_id, given_answer]
            properties:
              question_id: { type: string, format: uuid }
              given_answer: { type: string }

    QuizResult:
      type: object
      required: [attempt_id, score_achieved, is_passed, pass_mark]
      properties:
        attempt_id: { type: string }
        score_achieved: { type: number }
        is_passed: { type: boolean }
        pass_mark: { type: number }
        unlocked_next_module_id: { type: [string, "null"] }
        requires_manual_review:
          type: boolean
          description: True when the attempt contains manual items (paragraph / keyless short_answer) needing human review. These are excluded from auto pass/fail.
        duplicate: { type: boolean, description: True when a replayed client_mutation_id returned the prior attempt }
    QuizAssembly:
      type: object
      required: [module_id, question_count, questions]
      properties:
        module_id: { type: string, format: uuid }
        question_count: { type: integer }
        time_limit_sec:
          type: [integer, "null"]
          description: Server-enforced time limit; the clock starts at assembly. Null = no limit.
        attempts_remaining:
          type: [integer, "null"]
          description: Attempts left under the module's cap (server-counted). Null = unlimited.
        questions:
          type: array
          items:
            type: object
            required: [question_id, q_type, question_text]
            properties:
              question_id: { type: string, format: uuid }
              q_type:
                type: string
                enum: [MultipleChoice, TrueFalse, FillInTheBlank, multiple_choice, checkbox, dropdown, short_answer, paragraph, linear_scale]
              question_text: { type: string }
              answer_options:
                description: >-
                  Legacy rows: a JSON string array. New rows: an object with
                  `choices` ({id,text,is_correct}[]) for choice types and/or
                  `scale` ({min,max,min_label,max_label}) for linear_scale.
                  Null for free-text (short_answer/paragraph). Correct flags are
                  NEVER leaked at assembly (server strips them).
                type: [array, object, "null"]
    ExamAssembly:
      type: object
      required: [level_number, question_count, questions]
      properties:
        level_number: { type: integer }
        question_count: { type: integer }
        questions:
          type: array
          items:
            type: object
            required: [question_id, q_type, question_text]
            properties:
              question_id: { type: string, format: uuid }
              q_type:
                type: string
                enum: [MultipleChoice, TrueFalse, FillInTheBlank, multiple_choice, checkbox, dropdown, short_answer, paragraph, linear_scale]
              question_text: { type: string }
              answer_options:
                description: See QuizAssembly.answer_options. Correct flags stripped at assembly.
                type: [array, object, "null"]
    ExamResult:
      type: object
      required: [exam_attempt_id, score_achieved, is_passed, pass_mark]
      properties:
        exam_attempt_id: { type: string, format: uuid }
        score_achieved: { type: number }
        is_passed: { type: boolean }
        pass_mark: { type: number }
        requires_manual_review:
          type: boolean
          description: True when the exam contains manual items (paragraph / keyless short_answer) needing human review. Excluded from auto pass/fail.
        duplicate: { type: boolean }
    ThreadCreate:
      type: object
      required: [thread_id, title, body]
      properties:
        thread_id: { type: string, format: uuid, description: Client-generated (offline-first) }
        title: { type: string, minLength: 3, maxLength: 200 }
        body: { type: string, maxLength: 20000, description: Markdown }
        client_mutation_id: { type: string, format: uuid }
    CommentCreate:
      type: object
      required: [comment_id, body]
      properties:
        comment_id: { type: string, format: uuid, description: Client-generated (offline-first) }
        body: { type: string, maxLength: 10000 }
        client_mutation_id: { type: string, format: uuid }
    GiftsSubmission:
      type: object
      required: [client_mutation_id, answers]
      properties:
        client_mutation_id: { type: string, format: uuid }
        answers:
          type: array
          minItems: 1
          items:
            type: object
            required: [question_id, value]
            properties:
              question_id: { type: string, format: uuid }
              value: { type: integer, minimum: 1, maximum: 5, description: Likert 1 (rarely) … 5 (strongly agree) }
    PrayerUpsert:
      type: object
      required: [entry_id, body]
      properties:
        entry_id: { type: string, format: uuid, description: Client-generated (offline-first) }
        title: { type: [string, "null"], maxLength: 200 }
        body: { type: string, maxLength: 10000 }
        is_answered: { type: boolean, default: false }
        answered_note: { type: [string, "null"], maxLength: 2000 }
        updated_at: { type: string, format: date-time, description: LWW anchor — stale replays are no-ops }
        client_mutation_id: { type: string, format: uuid }
    VerseSave:
      type: object
      required: [saved_verse_id, reference]
      properties:
        saved_verse_id: { type: string, format: uuid, description: Client-generated (offline-first) }
        reference: { type: string, maxLength: 80 }
        version: { type: string, maxLength: 12, default: KJV }
        verse_text: { type: [string, "null"], maxLength: 2000 }
        note: { type: [string, "null"], maxLength: 2000 }
        client_mutation_id: { type: string, format: uuid }
    AnnouncementCompose:
      type: object
      required: [title, body, channels, audience]
      properties:
        title: { type: string, minLength: 3, maxLength: 200 }
        body: { type: string, description: Markdown, maxLength: 20000 }
        channels:
          type: array
          minItems: 1
          items: { type: string, enum: [push, email, sms, whatsapp, banner] }
        audience:
          oneOf:
            - type: object
              required: [kind]
              properties: { kind: { type: string, enum: [all] } }
            - type: object
              required: [kind, cell_group_ids]
              properties:
                kind: { type: string, enum: [cells] }
                cell_group_ids: { type: array, minItems: 1, items: { type: string, format: uuid } }
            - type: object
              required: [kind, level_number]
              properties:
                kind: { type: string, enum: [level] }
                level_number: { type: integer, minimum: 1 }
        scheduled_at: { type: string, format: date-time, description: Omit to keep as draft until /send }
        banner_expires_at: { type: string, format: date-time }
    ReflectionSubmit:
      type: object
      required: [reflection_text]
      properties:
        reflection_text: { type: string, minLength: 20, maxLength: 5000 }
    ReflectionReview:
      type: object
      required: [review_id, state, level_number]
      properties:
        review_id: { type: string, format: uuid }
        state: { type: string, enum: [pending, approved, rejected] }
        level_number: { type: integer }
    ReviewQueueItem:
      type: object
      required: [review_id, user_id, level_number, reflection_text, submitted_at]
      properties:
        review_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        full_name: { type: string }
        level_number: { type: integer }
        reflection_text: { type: string }
        cell_group_id: { type: [string, "null"], format: uuid }
        submitted_at: { type: string, format: date-time }
    ReviewDecision:
      type: object
      required: [decision]
      properties:
        decision: { type: string, enum: [approve, reject] }
        feedback_notes: { type: string, maxLength: 2000 }
    ReviewDecisionResult:
      type: object
      required: [review_id, state, leveled_up]
      properties:
        review_id: { type: string, format: uuid }
        state: { type: string, enum: [approved, rejected] }
        leveled_up: { type: boolean }

    # --- Offline sync (§3.6) ---
    SyncPullRequest:
      type: object
      properties:
        device_id: { type: string, format: uuid }
        cursors:
          type: object
          additionalProperties: { type: integer }
          description: Per-domain last-seen change_id
    SyncPullResponse:
      type: object
      required: [changes, tombstones, cursors]
      properties:
        changes:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              required: [op, row]
              properties:
                op: { type: string, enum: [upsert] }
                row: { type: object, additionalProperties: true }
        tombstones:
          type: object
          additionalProperties: { type: array, items: { type: string, format: uuid } }
        cursors:
          type: object
          additionalProperties: { type: integer }
    SyncPushRequest:
      type: object
      required: [mutations]
      properties:
        device_id: { type: string, format: uuid }
        mutations:
          type: array
          maxItems: 500
          items:
            type: object
            required: [mutation_id, seq, domain, op]
            properties:
              mutation_id: { type: string, format: uuid }
              seq: { type: integer }
              domain: { type: string }
              op: { type: string }
              payload: { type: object, additionalProperties: true }
    SyncPushResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [mutation_id, status]
            properties:
              mutation_id: { type: string, format: uuid }
              status: { type: string, enum: [applied, duplicate, rejected] }
              code: { type: string }
              detail: { type: string }

    # --- Engagement (§1.8) ---
    EngagementBreakdown:
      type: object
      required: [user_id, h_score, c_score, a_score, e_score, band]
      properties:
        user_id: { type: string, format: uuid }
        full_name: { type: string }
        h_score: { type: number, description: Habits (0–1) }
        c_score: { type: number, description: Curriculum (0–1) }
        a_score: { type: number, description: Attendance (0–1) }
        e_score: { type: number, description: Composite Eᵢ (0–1) }
        band: { type: string, enum: [thriving, steady, watch, at_risk] }
        last_active_days_ago: { type: [integer, "null"] }
        window_end: { type: string, format: date }
        computed_at: { type: string, format: date-time }

    # --- Certificates (§5.5) ---
    Certificate:
      type: object
      required: [certificate_id, verification_code, issued_at]
      properties:
        certificate_id: { type: string, format: uuid }
        level_number: { type: [integer, "null"] }
        verification_code: { type: string }
        pdf_object_key: { type: string }
        issued_at: { type: string, format: date-time }
        download_url: { type: string }
    CertificateVerification:
      type: object
      required: [valid]
      properties:
        valid: { type: boolean }
        revoked: { type: boolean }
        recipient_name: { type: string }
        level_number: { type: [integer, "null"] }
        issued_at: { type: string, format: date-time }
        verification_code: { type: string }
        content_hash: { type: string, description: "SHA-256 over the issuance facts" }
        signature: { type: string, description: "HMAC-SHA256 detached signature (§5.5 KMS stand-in)" }
